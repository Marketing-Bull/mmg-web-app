name: Sync GHL content

# Pulls Events & Sponsors from GHL Custom Objects into data/*.json on a
# schedule, then commits any changes (which triggers a Vercel redeploy).
# Requires repo secrets: GHL_API_TOKEN, GHL_LOCATION_ID
# Optional: GHL_EVENTS_OBJECT_KEY, GHL_SPONSORS_OBJECT_KEY

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-ghl
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sync from GHL
        env:
          GHL_API_TOKEN: ${{ secrets.GHL_API_TOKEN }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          GHL_EVENTS_OBJECT_KEY: ${{ secrets.GHL_EVENTS_OBJECT_KEY }}
          GHL_SPONSORS_OBJECT_KEY: ${{ secrets.GHL_SPONSORS_OBJECT_KEY }}
        run: node scripts/sync-ghl.mjs
      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "mmg-content-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/events.json data/sponsors.json
            git commit -m "chore: sync events & sponsors from GHL [skip ci]"
            git push
          else
            echo "No content changes."
          fi
